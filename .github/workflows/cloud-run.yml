name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  # GCP Configuration
  PROJECT_ID: ai-voice-agent-c2a2b
  SERVICE: portfolio
  REGION: us-central1
  
  # Suppress Node 20 deprecation warnings from GitHub Actions runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    
    # Required for Workload Identity Federation (GCP Option 2)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- GOOGLE CLOUD AUTHENTICATION ---
    # OPTION 1 (Easiest, Service Account Key): Go to GCP IAM -> Service Accounts -> Create Key (JSON)
    # Then go to GitHub Repo -> Settings -> Secrets and Variables -> Actions -> New repository secret
    # Name it GCP_CREDENTIALS and paste the massive JSON blob there.
    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    # OPTION 2 (More Secure, Workload Identity Federation)
    # Comment out Option 1 and uncomment Option 2 if you prefer WIF.
    # - name: Google Auth
    #   id: auth
    #   uses: 'google-github-actions/auth@v2'
    #   with:
    #     workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
    #     service_account: 'my-service-account@my-project.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker push
      run: gcloud auth configure-docker gcr.io

    - name: Build and Push Docker image
      run: |-
        docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} .
        docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}

    - name: Deploy to Cloud Run
      id: deploy
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE }}
        region: ${{ env.REGION }}
        image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
        flags: '--allow-unauthenticated'

    - name: Show Output
      run: echo "🚀 Deployed URL - ${{ steps.deploy.outputs.url }}"
